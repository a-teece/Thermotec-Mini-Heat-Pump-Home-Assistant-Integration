# ─── Globals ────────────────────────────────────────────────────────────────
# ─── Required Secrets ───────────────────────────────────────────────────────
# These secrets are required in your secrets.yaml file which can easily be
# edited in the ESP Home dashboard (top right).
#  wifi_ssid: "your WiFi network name"
#  wifi_password: "your WiFi network key"
#  ap_fallback_password: "a strong password for the fallback WiFi hotspot, e.g. my_secure_fallback_password"
#  ota_password: "a strong password for OTA updates, e.g. my_very_secure_password"
#  pool_heatpump_proxy_api_key: "a random 16-byte hex string for API encryption, e.g. 0123456789abcdef0123456789abcdef"
#  pool_heatpump_proxy_device_mac_address: "your heat pump's BLE MAC address, e.g. AA:BB:CC:DD:EE:FF"

# ─── Globals ────────────────────────────────────────────────────────────────
substitutions:
  device_name: pool-heatpump-proxy
  friendly_name: Pool Heatpump Proxy
  service_uuid: "0000ff01-0000-1000-8000-00805f9b34fb"
  write_char_uuid: "0000ff03-0000-1000-8000-00805f9b34fb"
  notify_char_uuid: "0000ff02-0000-1000-8000-00805f9b34fb"

  # So that we can update values in Home Assistant while this device is asleep,
  # we use some Home Assistant helpers.
  # Create them in HA "Settings → Devices & Services → Helpers → Create".
  # Suggested name/id. If the name changes, update the `entity_id` below to match.

  #  Type: Toggle helper (aka input_boolean)
  #  Name: Pool Heater Prevent Deep Sleep
  #  Entity ID: input_boolean.pool_heater_prevent_deep_sleep
  home_assistant_prevent_deep_sleep_switch_name: input_boolean.pool_heater_prevent_deep_sleep

  #  Type: Toggle helper (aka input_boolean)
  #  Name: Pool Heater Power
  #  Entity ID: input_boolean.pool_heater_power
  home_assistant_desired_power_state_switch_name: input_boolean.pool_heater_power

  #  Type: Number (aka input_number)
  #  Name: Pool Target Temperature
  #  Entity ID: input_number.pool_target_temperature
  #  Minimum: 15
  #  Maximum: 40
  #  Step: 0.5
  #  Unit: °C
  #  Display: Slider
  home_assistant_desired_target_temp_number_name: input_number.pool_target_temperature

  #  Type: Dropdown (aka input_select)
  #  Name: Pool Heater Mode
  #  Entity ID: input_select.pool_heater_mode
  #  Options: Heat, Cool, Auto
  home_assistant_desired_mode_select_name: input_select.pool_heater_mode

# ─── Globals ────────────────────────────────────────────────────────────────
globals:
  # Tracks whether the BLE link to the heat pump is up.
  # Used by on_boot to wait until connected before sleeping.
  # NOT restored — BLE state from a previous wake cycle is meaningless.
  - id: ble_connected
    type: bool
    initial_value: 'false'
    restore_value: no

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    # Run after WiFi/API are initialized but before deep_sleep enters.
    # Priority -100 places us late in the boot sequence.
    priority: -100.0
    then:
      # ── Phase 1: Wait for the HA API ────────────────────────────────────
      # We need the API to read the prevent-sleep helper and the desired
      # target temp helper. Without it we'd risk sleeping when we shouldn't.
      - wait_until:
          condition:
            api.connected:
          timeout: 15s

      # ── Phase 2: Give HA a moment to push helper states ─────────────────
      # After the API connects, HA sends the current values of mirrored
      # helpers. A short delay ensures they've arrived before we read them.
      - delay: 2s

      # ── Phase 3: Decide between awake mode and a sleep cycle ────────────
      - if:
          condition:
            - binary_sensor.is_on: prevent_deep_sleep_switch
          then:
            # ── AWAKE MODE: stay on for OTA, debugging, or fast feedback ─
            - deep_sleep.prevent: deep_sleep_1
            - logger.log:
                level: INFO
                format: "Deep sleep prevented — OTA/debug mode active"
            # The interval timer below handles continuous 30s polling.
          else:
            # ── SLEEP CYCLE: wake → connect → sync target → sleep ───────

            # Phase 4: Wait for BLE link to the heat pump.
            # auto_connect starts scanning at boot. Connection usually
            # completes in 5-15s depending on RF conditions.
            - logger.log:
                level: INFO
                format: "Waiting for BLE connection to heat pump..."
            - wait_until:
                condition:
                  lambda: 'return id(ble_connected);'
                timeout: 30s

            # Phase 5: Allow the on_connect handler to finish its work.
            # That handler polls the heat pump (3s after connect), waits for
            # the notify responses (~1s), then runs the target-sync logic
            # (5s + ~2s for a write if needed). 12s covers it comfortably.
            - delay: 12s

            # Phase 6: Refresh diagnostic readings before sleep.
            # These are pushed to HA just before we drop the WiFi link.
            - component.update: battery_voltage
            - component.update: last_connected

            # Phase 7: Final settle time so HA receives everything.
            - delay: 3s

            # Phase 8: Enter deep sleep until the next wake cycle.
            - logger.log:
                level: INFO
                format: "Entering deep sleep"
            - deep_sleep.enter: deep_sleep_1

esp32:
  board: dfrobot_firebeetle2_esp32c6
  variant: ESP32C6
  framework:
    type: esp-idf
    version: recommended

# ─── Logging ────────────────────────────────────────────────────────────────
logger:
  level: INFO
  baud_rate: 115200
  logs:
    # Silence the noisy "Error reading char at handle 16, status=2" warning
    # that fires once at boot — ble_client tries to read the notify
    # characteristic at startup and the heat pump rejects it (notify-only).
    ble_sensor: ERROR
    # Quieten per-publish state changes on routine sensor updates.
    sensor: WARN

# ─── Home Assistant API ─────────────────────────────────────────────────────
api:
  encryption:
    key: !secret pool_heatpump_proxy_api_key

ota:
  - platform: esphome
    password: !secret ota_password

# ─── WiFi (with captive portal fallback) ────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: ${device_name}
    password: !secret ap_fallback_password

captive_portal:

# ─── Time ───────────────────────────────────────────────────────────────────
# Sync from HA over the API. Required for the last_connected text sensor
# to display a human-readable wake timestamp.
time:
  - platform: homeassistant
    id: ha_time

# ─── Deep Sleep ─────────────────────────────────────────────────────────────
# No run_duration set — sleep is entered explicitly from on_boot once the
# wake cycle's work is complete. This avoids ever sleeping mid-BLE-write.
#
# sleep_duration controls how long the chip stays off between cycles.
# 5 min is a reasonable default; raise it to extend battery life at the
# cost of slower response to HA helper changes.
deep_sleep:
  id: deep_sleep_1
  sleep_duration: 5min

# ─── BLE ────────────────────────────────────────────────────────────────────
# Aggressive scan duty cycle (window == interval). We're awake briefly
# each cycle so fast connection matters more than scan-time power savings.
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: true

ble_client:
  - mac_address: !secret pool_heatpump_proxy_device_mac_address
    id: heatpump_ble
    auto_connect: true
    on_connect:
      then:
        - logger.log: "Heat pump connected"
        - lambda: 'id(ble_connected) = true;'
        # Wait briefly for service discovery to complete, then poll.
        - delay: 3s
        # Poll the heat pump to populate current_target_temp, current_power_state, etc.
        - script.execute: poll_heat_pump
        # Wait for the 4 fragmented notifications to populate
        # current_target_temp and the heat pump temperatures.
        - delay: 5s
        
        # ── Reconcile HA helpers ──
        # Runs on every BLE (re)connect, so handles:
        #   - First connection on each wake from deep sleep
        #   - Reconnects after a brief BLE drop while awake
        #   - Catching up if the helper changed while BLE was down


        # ── Target temp ──
        - if:
            condition:
              lambda: |-
                if (!id(desired_target_temp).has_state()) return false;
                if (!id(current_target_temp).has_state()) return false;
                float desired = id(desired_target_temp).state;
                float current = id(current_target_temp).state;
                // 0.05°C tolerance avoids spurious writes from float
                // precision (heat pump stores in 0.1°C steps).
                return fabsf(desired - current) > 0.05f;
            then:
              - logger.log:
                  level: INFO
                  format: "Syncing target: HA=%.1f, heat pump=%.1f"
                  args: ['id(desired_target_temp).state',
                         'id(current_target_temp).state']
              - script.execute:
                  id: write_target_temp
                  temp_x10: !lambda 'return (int)(id(desired_target_temp).state * 10);'

        # ── Mode ──
        - if:
            condition:
              lambda: |-
                if (!id(desired_mode).has_state()) return false;
                if (!id(current_mode).has_state()) return false;
                return id(desired_mode).state != id(current_mode).state;
            then:
              - logger.log:
                  level: INFO
                  format: "Syncing mode: HA=%s, heat pump=%s"
                  args: ['id(desired_mode).state.c_str()',
                         'id(current_mode).state.c_str()']
              - script.execute:
                  id: write_mode
                  mode: !lambda 'return id(desired_mode).state;'

        # ──  Power State ──
        - if:
            condition:
              lambda: |-
                if (!id(desired_power_state).has_state()) return false;
                if (!id(current_power_state).has_state()) return false;
                return id(desired_power_state).state != id(current_power_state).state;
            then:
              - logger.log:
                  level: INFO
                  format: "Syncing power: HA=%s, heat pump=%s"
                  args: ['id(desired_power_state).state ? "ON" : "OFF"',
                         'id(current_power_state).state ? "ON" : "OFF"']
              - script.execute:
                  id: write_power_state
                  power_on: !lambda 'return id(desired_power_state).state;'

    on_disconnect:
      then:
        - logger.log: "Heat pump disconnected"
        - lambda: 'id(ble_connected) = false;'

# ─── Binary Sensors ─────────────────────────────────────────────────────────
binary_sensor:
  # ── Prevent Deep Sleep helper ─────────────────────────────────────────────
  # Mirrors the HA helper defined by the global home_assistant_prevent_deep_sleep_switch_name.
  # Because the state lives in HA, it can be toggled while the device is asleep and the new 
  # value will be read on the next wake from on_boot.
  - platform: homeassistant
    id: prevent_deep_sleep_switch
    entity_id: ${home_assistant_prevent_deep_sleep_switch_name}
    on_state:
      then:
        - if:
            condition:
              - binary_sensor.is_off: prevent_deep_sleep_switch
            then:
              # Toggle was just turned off while device was awake → sleep.
              - logger.log:
                  level: INFO
                  format: "Prevent deep sleep disabled — sleeping shortly"
              - component.update: battery_voltage
              - component.update: last_connected
              - delay: 5s
              - deep_sleep.enter: deep_sleep_1
            else:
              # Toggle just turned on while awake → cancel any pending sleep.
              - logger.log:
                  level: INFO
                  format: "Prevent deep sleep enabled — staying awake"
              - deep_sleep.prevent: deep_sleep_1

  # ─── Desired Power State (mirror of HA helper) ───────────────────────────
  # Mirrors the HA helper defined by the global home_assistant_desired_power_state_switch_name.
  # Like the target temp helper, the value lives in HA so it can be changed while the device is 
  # asleep — the new state is read on the next wake and applied via the on_connect handler.
  - platform: homeassistant
    id: desired_power_state
    entity_id: ${home_assistant_desired_power_state_switch_name}
    on_state:
      then:
        # Apply immediately if the heat pump is reachable and the value differs.
        # Otherwise the on_connect handler will catch it on the next wake.
        - if:
            condition:
              lambda: |-
                if (!id(current_power_state).has_state()) return false;
                if (!id(ble_connected)) return false;
                return id(desired_power_state).state != id(current_power_state).state;
            then:
              - logger.log:
                  level: INFO
                  format: "Helper changed power to %s — writing to heat pump"
                  args: ['id(desired_power_state).state ? "ON" : "OFF"']
              - script.execute:
                  id: write_power_state
                  power_on: !lambda 'return id(desired_power_state).state;'
              - delay: 2s
              - script.execute: poll_heat_pump

  # ─── Current Power State (read from BLE notify) ──────────────────────────
  # Reflects the heat pump's actual power state as reported via BLE. May briefly
  # differ from desired_power_state while a sync is in flight, or
  # persistently if someone uses the heat pump's physical control panel
  # (HA helper takes priority on the next sync).
  - platform: template
    id: current_power_state
    name: "Power State"
    icon: "mdi:power"
    device_class: power

  # ── BLE link status ───────────────────────────────────────────────────────
  - platform: template
    id: ble_status
    name: "Heat Pump BLE Connection"
    device_class: connectivity
    lambda: 'return id(ble_connected);'

  # ─── Diagnostic outputs ───────────────────────────────────────────────────
  # output_compressor, output_circulate_pump, output_high_fan and output_4way_valve are 
  # decoded from the bitmask at register 0x07E3 in the notify response.
  - platform: template
    id: output_compressor
    name: "Compressor"
    icon: "mdi:engine"
    device_class: running
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s    # debounce: only publish if state holds for 1 second to remove the duplicate BLE responses

  - platform: template
    id: output_circulate_pump
    name: "Circulate Pump"
    icon: "mdi:pump"
    device_class: running
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s    # debounce: only publish if state holds for 1 second to remove the duplicate BLE responses

  - platform: template
    id: output_high_fan
    name: "High Fan"
    icon: "mdi:fan"
    device_class: running
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s    # debounce: only publish if state holds for 1 second to remove the duplicate BLE responses

  - platform: template
    id: output_4way_valve
    name: "4-Way Valve"
    icon: "mdi:valve"
    device_class: opening
    entity_category: diagnostic
    filters:
      - delayed_on_off: 1s    # debounce: only publish if state holds for 1 second to remove the duplicate BLE responses

  - platform: template
    id: has_error
    name: "Has Error"
    icon: "mdi:alert"
    device_class: problem
    entity_category: diagnostic

# ─── Sensors ────────────────────────────────────────────────────────────────
sensor:
  # ── Desired Target Temperature (HA helper mirror) ─────────────────────────
  # Mirrors the HA helper defined by the global home_assistant_desired_target_temp_number_name.
  # Because the value lives in HA, it can be updated  while the device is asleep
  #   - If the device is awake, the on_value handler writes immediately.
  #   - If asleep, on_boot reads the new value on the next wake and the
  #     ble_client on_connect handler syncs it to the heat pump.
  - platform: homeassistant
    id: desired_target_temp
    entity_id: ${home_assistant_desired_target_temp_number_name}
    on_value:
      then:
        # Only write if BLE is up, both sensors have state, and the
        # helper differs from the heat pump's current value. The has_state
        # checks prevent firing during the initial sync at boot before
        # we've received the heat pump's current target.
        - if:
            condition:
              lambda: |-
                if (!id(current_target_temp).has_state()) return false;
                if (!id(desired_target_temp).has_state()) return false;
                if (!id(ble_connected)) return false;
                float desired = id(desired_target_temp).state;
                float current = id(current_target_temp).state;
                return fabsf(desired - current) > 0.05f;
            then:
              - logger.log:
                  level: INFO
                  format: "Helper changed to %.1f — writing to heat pump"
                  args: ['id(desired_target_temp).state']
              - script.execute:
                  id: write_target_temp
                  temp_x10: !lambda 'return (int)(id(desired_target_temp).state * 10);'
              - delay: 2s
              # Re-poll to confirm the write took effect
              - script.execute: poll_heat_pump

  # ── BLE Notification Parser (internal) ────────────────────────────────────
  # This sensor subscribes to BLE notifications from the heat pump and parses
  # each Modbus reply into the real sensors below. It has no value of its
  # own — returning {} from the lambda means "don't publish".
  #
  # Each notification arrives as a std::vector<uint8_t> in `x`.
  - platform: ble_client
    type: characteristic
    ble_client_id: heatpump_ble
    id: notify_handler
    name: "Heat Pump Raw Notify"
    service_uuid: ${service_uuid}
    characteristic_uuid: ${notify_char_uuid}
    notify: true
    internal: true
    lambda: |-
      // Sanity check
      if (x.size() < 5 || x[0] != 0x63) return {};

      // Write ACK (8-byte Modbus 0x10 response)
      if (x[1] == 0x10 && x.size() == 8) {
        uint16_t ack = (x[2] << 8) | x[3];
        ESP_LOGI("heatpump", "Write ACK for 0x%04X", ack);
        return {};
      }

      // Modbus exception
      if ((x[1] & 0x80) && x.size() >= 5) {
        ESP_LOGW("heatpump", "Modbus exception 0x%02X for func 0x%02X",
                 x[2], x[1] & 0x7F);
        return {};
      }

      // Data block (fragmented read response).
      // Format: 63 10 [block_hi] [block_lo] 00 2D 5A [9 regs of data...]
      if (x[1] != 0x10 || x.size() < 9) return {};

      uint16_t block = (x[2] << 8) | x[3];
      auto rd = [&](size_t i) -> int16_t {
        size_t p = 7 + i * 2;
        if (p + 1 >= x.size()) return 0;
        return (int16_t)((x[p] << 8) | x[p+1]);
      };

      if (block == 0x07FE) {
        // Temperature block. Reg 0 (T01 suction) is usually disconnected
        // (0x7FFD) on this model so we skip publishing it.
        id(inlet_temp).publish_state(rd(1) / 10.0);
        id(outlet_temp).publish_state(rd(2) / 10.0);
        id(coil_temp).publish_state(rd(3) / 10.0);
        id(ambient_temp).publish_state(rd(4) / 10.0);
        id(exhaust_temp).publish_state(rd(5) / 10.0);
        ESP_LOGI("heatpump", "Temps updated");
      } else if (block == 0x0416) {
        // Each mode has its own target register in this block:
        //   reg 0  (0x0416) = R01 Heating set
        //   reg 5  (0x041B) = R06 Cooling set
        //   reg 22 (0x042C) = R11 Auto set
        // The heat pump's display shows whichever matches the current mode,
        // so we mirror that here.
        std::string mode_str = id(current_mode).has_state()
                               ? id(current_mode).state
                               : std::string("Heat");
        float displayed_target;
        if (mode_str == "Cool")      displayed_target = rd(5)  / 10.0;
        else if (mode_str == "Auto") displayed_target = rd(22) / 10.0;
        else                         displayed_target = rd(0)  / 10.0;
        id(current_target_temp).publish_state(displayed_target);
        ESP_LOGI("heatpump", "Target (%s mode) = %.1f",
                 mode_str.c_str(), displayed_target);

        // Diagnostic sensors — always publish all three set-points
        id(heating_set_temp).publish_state(rd(0) / 10.0);
        id(cooling_set_temp).publish_state(rd(5) / 10.0);
        id(auto_set_temp).publish_state(rd(22) / 10.0);
        id(min_heat_temp).publish_state(rd(3) / 10.0);
        id(max_heat_temp).publish_state(rd(4) / 10.0);
        id(min_cool_temp).publish_state(rd(8) / 10.0);
        id(max_cool_temp).publish_state(rd(9) / 10.0);

        // D06 Defrost type at reg 15 (0x0425): 0=Normal, 1=Eco
        int16_t dt = rd(15);
        id(defrost_type).publish_state(
          dt == 0 ? std::string("Normal") :
          dt == 1 ? std::string("Eco") :
          std::string("Unknown"));

        ESP_LOGI("heatpump", "Heat Pump target = %.1f", rd(0) / 10.0);
} else if (block == 0x03E9) {
        // Block containing register 0x03F3 at offset 10 = power state
        int16_t power = rd(10);
        bool is_on = (power != 0);
        id(current_power_state).publish_state(is_on);

        // Mode at offset 11 (register 0x03F4)
        // 0 = Heat, 1 = Cool, 2 = Auto
        int16_t mode = rd(11);
        const char *mode_str;
        switch (mode) {
          case 0:  mode_str = "Heat"; break;
          case 1:  mode_str = "Cool"; break;
          case 2:  mode_str = "Auto"; break;
          default: mode_str = "Unknown"; break;
        }
        id(current_mode).publish_state(std::string(mode_str));

        // H06 Mode type at reg 22 (0x03FF): 1=Heat pump, 2=Heat only (4-way valve)
        int16_t mt = rd(22);
        id(heater_mode_type).publish_state(
          mt == 1 ? std::string("Heat pump") :
          mt == 2 ? std::string("Heat only (4-way valve)") :
          std::string("Unknown"));

        // P01 Circulating pump mode at reg 36 (0x040D): 0=Normal, 1=Stop, 2=Interval
        int16_t pm = rd(36);
        id(pump_mode).publish_state(
          pm == 0 ? std::string("Normal") :
          pm == 1 ? std::string("Stop") :
          pm == 2 ? std::string("Interval") :
          std::string("Unknown"));

        ESP_LOGI("heatpump", "Heat Pump power=%s mode=%s", is_on ? "ON" : "OFF", mode_str);

      } else if (block == 0x07D1) {
        // Block containing output states at offset 18 (register 0x07E3).
        // Bitmask:
        //   bit 0 (0x01) = compressor  (confirmed via capture)
        //   bit 1 (0x02) = circulate pump  (inferred from app O01-O04 order)
        //   bit 2 (0x04) = high fan  (confirmed via capture)
        //   bit 3 (0x08) = 4-way valve  (inferred from app O01-O04 order)
        int16_t outputs = rd(18);
        id(output_compressor).publish_state((outputs & 0x01) != 0);
        id(output_circulate_pump).publish_state((outputs & 0x02) != 0);
        id(output_high_fan).publish_state((outputs & 0x04) != 0);
        id(output_4way_valve).publish_state((outputs & 0x08) != 0);

        // Firmware identity (block 0x07D1 reg 16 + reg 17).
        // These are stable across reads — published once per session.
        // reg 16 (0x07E1) = "Master program version number", DIGI5 (×10)
        //                   e.g. raw 12 → "1.2"
        // reg 17 (0x07E2) = "Main control software code", DIGI1 (raw)
        //                   e.g. 494
        uint16_t master_ver_raw = rd(16);
        uint16_t soft_code      = rd(17);

        char ver_buf[16];
        snprintf(ver_buf, sizeof(ver_buf), "%u.%u",
                 master_ver_raw / 10, master_ver_raw % 10);
        std::string ver_str(ver_buf);
        if (!id(master_program_version).has_state() ||
            id(master_program_version).state != ver_str) {
          id(master_program_version).publish_state(ver_str);
        }

        char code_buf[16];
        snprintf(code_buf, sizeof(code_buf), "%u", soft_code);
        std::string code_str(code_buf);
        if (!id(main_control_software_code).has_state() ||
            id(main_control_software_code).state != code_str) {
          id(main_control_software_code).publish_state(code_str);
        }


        // Error code at offset 33 (register 0x07F2).
        // 0 = no error; 4 = E03 (water flow) confirmed via BLE capture, but see comment below on
        // error_code and error_description sensor for more details on the raw code and display mapping.
        int16_t err = rd(33);
        id(error_code).publish_state(err);

        ESP_LOGI("heatpump", "Outputs = 0x%04X, Error = 0x%04X", outputs, err);
      }
      return {};

  # ── Temperature sensors (parsed from BLE notifications) ───────────────────
  - platform: template
    id: inlet_temp
    name: "Inlet Water Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05   # only publish if value moved more than 0.05°C to remove the duplicate BLE responses

  - platform: template
    id: outlet_temp
    name: "Outlet Water Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05   # only publish if value moved more than 0.05°C to remove the duplicate BLE responses

  - platform: template
    id: coil_temp
    name: "Coil Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05   # only publish if value moved more than 0.05°C to remove the duplicate BLE responses

  - platform: template
    id: ambient_temp
    name: "Ambient Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05   # only publish if value moved more than 0.05°C to remove the duplicate BLE responses

  - platform: template
    id: exhaust_temp
    name: "Exhaust Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05   # only publish if value moved more than 0.05°C to remove the duplicate BLE responses

  # ── Current Heat Pump Target (read-only) ─────────────────────────────────────
  # Reflects what the heat pump itself currently thinks the target is, as
  # reported via BLE. May briefly differ from `desired_target_temp` while
  # a sync is in flight, or persistently if someone changes the target on
  # the heat pump's physical control panel (the HA helper takes priority and
  # will overwrite on the next sync).
  - platform: template
    id: current_target_temp
    name: "Current Target Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.05   # only publish if value moved more than 0.05°C to remove the duplicate BLE responses

  # ─── Heat Pump Error Code (raw value) ─────────────────────────────────────────
  # Reads register 0x07F2 from the heat pump. 0 = no error, non-zero = fault.
  # The display shows error codes like E03 which appear to map to internal
  # values with an off-by-one offset (E03 = value 4) OR a bitmask (E03 = Bit 2 aka 0x04).
  # I haven't fully decoded the mapping yet, but capturing the raw code here allows 
  # for future decoding as more faults are encountered.
  - platform: template
    id: error_code
    name: "Error Code"
    icon: "mdi:alert-circle"
    entity_category: diagnostic
    accuracy_decimals: 0
    # Set from the BLE notify parser, never independently polled
    update_interval: never
    # When the raw code changes, push a translated description and the
    # has-error binary state
    on_value:
      then:
        - component.update: error_description
        - lambda: |-
            id(has_error).publish_state(id(error_code).state != 0);

  # ─── R-tab setpoint diagnostics ────────────────────────────────────────────
  - platform: template
    id: heating_set_temp
    name: "Heating Set Temp (R01)"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: cooling_set_temp
    name: "Cooling Set Temp (R06)"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: auto_set_temp
    name: "Auto Set Temp (R11)"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement
    accuracy_decimals: 1
    entity_category: diagnostic
    filters:
      - delta: 0.05

  - platform: template
    id: min_heat_temp
    name: "Min Heat Limit (R04)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    entity_category: diagnostic

  - platform: template
    id: max_heat_temp
    name: "Max Heat Limit (R05)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    entity_category: diagnostic

  - platform: template
    id: min_cool_temp
    name: "Min Cool Limit (R09)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    entity_category: diagnostic

  - platform: template
    id: max_cool_temp
    name: "Max Cool Limit (R10)"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    entity_category: diagnostic

  # ── Battery Voltage ───────────────────────────────────────────────────────
  # The Firebeetle 2 ESP32-C6 has an onboard 1:1 voltage divider on GPIO0.
  # 12dB attenuation gives the ADC a ~3.1V max range; the multiply: 2.0
  # filter restores the actual cell voltage (LiPo 3.0–4.2V).
  - platform: adc
    pin: GPIO0
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 5min
    attenuation: 12db
    filters:
      - multiply: 2.0
      # Smooth ADC noise across 3 readings, publish every time so the
      # brief wake window always gets a value out before sleep.
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
    unit_of_measurement: "V"
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 2
    on_value:
      then:
        # Refresh derived battery percentage whenever voltage updates.
        # Prevents a race where battery_level evaluates before
        # battery_voltage has a valid reading.
        - component.update: battery_level

  # ── Battery Percentage (derived from voltage) ─────────────────────────────
  # Simple linear curve: 3.0V = 0%, 4.2V = 100%. Good enough as a rough
  # state-of-charge indicator. For better accuracy, replace with a
  # piecewise discharge curve specific to your cell chemistry.
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    # Never poll independently — only updated via on_value above.
    update_interval: never
    lambda: |-
      float v = id(battery_voltage).state;
      if (isnan(v)) return {};
      float pct = (v - 3.0f) / (4.2f - 3.0f) * 100.0f;
      return clamp(pct, 0.0f, 100.0f);

# ─── Text Sensors ───────────────────────────────────────────────────────────
text_sensor:
  # Wall-clock time of the last successful wake. Acts as a heartbeat:
  # if this value stops updating, the device isn't waking properly.
  - platform: template
    name: "Last Connected"
    id: last_connected
    icon: "mdi:clock-outline"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      auto now = id(ha_time).now();
      // Return nothing if time hasn't synced yet — avoids a garbage stamp.
      if (!now.is_valid()) return {};
      char buf[32];
      snprintf(buf, sizeof(buf), "%04d-%02d-%02d %02d:%02d:%02d",
               now.year, now.month, now.day_of_month,
               now.hour, now.minute, now.second);
      return {buf};

# ─── Desired Mode (mirror of HA helper) ──────────────────────────────────
  # Mirrors the input_select helper. Like the other mirrored helpers, the
  # value lives in HA so it can be changed while the device is asleep — the
  # new state is read on the next wake and applied via on_connect.
  #
  # Expected values: "Heat", "Cool", "Auto"
  - platform: homeassistant
    id: desired_mode
    entity_id: ${home_assistant_desired_mode_select_name}
    on_value:
      then:
        # Apply immediately if heat pump is reachable and value differs.
        # Otherwise on_connect handler will catch it on the next wake.
        - if:
            condition:
              lambda: |-
                if (!id(current_mode).has_state()) return false;
                if (!id(ble_connected)) return false;
                return id(desired_mode).state != id(current_mode).state;
            then:
              - logger.log:
                  level: INFO
                  format: "Helper changed mode to %s — writing to heat pump"
                  args: ['id(desired_mode).state.c_str()']
              - script.execute:
                  id: write_mode
                  mode: !lambda 'return id(desired_mode).state;'


        # After changing the mode reset the target temperature.
              - delay: 2s
              - script.execute: poll_heat_pump

  # ─── Current Mode (read from BLE notify) ─────────────────────────────────
  # Reflects the heat pump's actual mode as reported via BLE. Updated by the
  # notify parser when block 0x03E9 arrives — register 0x03F4 at offset 11.
  - platform: template
    id: current_mode
    name: "Current Mode"
    icon: "mdi:thermostat"

  # ─── Heat Pump Error Description ─────────────────────────────────────────────
  # Translates the raw error code into the display code (E0n) and a
  # description. Add new mappings here as you observe other faults.
  #
  # Confirmed mappings (from BLE capture analysis):
  #   value 0 → No error
  #   value 4 → E03: Water Flow (heat pump shows "E03" on its display)
  #
  # Other codes may be added once observed.
  - platform: template
    name: "Error Description"
    id: error_description
    icon: "mdi:alert-circle-outline"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      if (!id(error_code).has_state()) return std::string("Unknown");
      int code = (int)id(error_code).state;
      switch (code) {
        case 0:  return std::string("OK");
        case 4:  return std::string("E03: No water flow or flow switch failure");
        // Add more cases here as we discover them (and figure out if it is an offset or a bitmask).
        // Errors documented in the manual are:
        //  P01: Water intel temperature sensor failure
        //  P02: Water outlet temperature sensor failure
        //  P04: Ambient temperature sensor failure
        //  P05: Coil temperature sensor failure
        //  P81: Exhaust temperature sensor failure
        //  P82: Exhaust temperature protection
        //  E01: High pressure protection
        //  E02: Low pressure protection
        //  E03: No water flow or flow switch failure
        //  E06: Temperature is too different between inlet and outlet
        //  E08: Communication failure
        //  TP: Low ambient temperature protection
        //  DF: Defrosting
        default: {
          char buf[64];
          snprintf(buf, sizeof(buf), "Unknown error (raw=%d)", code);
          return std::string(buf);
        }
      }

  # ─── Advanced settings (read-only diagnostics) ────────────────────────────
  # Although it is understood how to set these, it may be dangerous to set them
  # incorrectly so they're implemented as read-only diagnostics for now.
  # Change them using the AquaTemp app and the password "66" for the
  # device parameters menu.
  - platform: template
    id: defrost_type
    name: "Defrost Type"
    icon: "mdi:snowflake-melt"
    entity_category: diagnostic

  - platform: template
    id: heater_mode_type
    name: "Heat Pump Mode Type"
    icon: "mdi:cog"
    entity_category: diagnostic

  - platform: template
    id: pump_mode
    name: "Circulating Pump Mode"
    icon: "mdi:pump"
    entity_category: diagnostic

  # ─── Master Program Version (register 0x07E1) ─────────────────────────────
  # Displayed on the heat pump's control panel as "Master program version
  # number". A DIGI5 value (scaled ×10), so raw 12 = "1.2".
  - platform: template
    name: "Master Program Version"
    id: master_program_version
    icon: "mdi:chip"
    entity_category: diagnostic

  # ─── Main Control Software Code (register 0x07E2) ─────────────────────────
  # Displayed on the heat pump's control panel as "Main control software
  # code". A DIGI1 value (raw integer build code), e.g. 494.
  - platform: template
    name: "Main Control Software Code"
    id: main_control_software_code
    icon: "mdi:chip"
    entity_category: diagnostic

# ─── Scripts ────────────────────────────────────────────────────────────────
script:
  # Send the Modbus "read all status" command to the heat pump.
  # The heat pump replies with 4 fragmented notifications covering blocks
  # 0x03E9, 0x0416, 0x07D1, 0x07FE — the BLE notify parser above picks
  # them apart and publishes to the real sensors.
  - id: poll_heat_pump
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: [0x63, 0x03, 0x00, 0x07, 0x00, 0x2D, 0x3C, 0x54]

  # Write a new target temperature to the register appropriate to the
  # current operating mode:
  #   Heat → 0x0416 (R01 Heating set)
  #   Cool → 0x041B (R06 Cooling set)
  #   Auto → 0x042C (R11 Auto set)
  #
  # If the current mode isn't known yet (e.g. first connect after wake
  # before the heat pump has been polled), default to heat target — that's
  # the most common case and matches the previous behaviour.
  - id: write_target_temp
    parameters:
      temp_x10: int
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: !lambda |-
            // Pick the right register based on current mode
            std::string mode_str = id(current_mode).has_state()
                                   ? id(current_mode).state
                                   : std::string("Heat");
            uint8_t addr_hi = 0x04, addr_lo = 0x16;  // default: heat
            if (mode_str == "Cool") {
              addr_hi = 0x04; addr_lo = 0x1B;
            } else if (mode_str == "Auto") {
              addr_hi = 0x04; addr_lo = 0x2C;
            }

            // Clamp to the mode-appropriate range
            if (mode_str == "Cool") {
              if (temp_x10 < 100) temp_x10 = 100;   // R09 Min cool = 10°C
              if (temp_x10 > 350) temp_x10 = 350;   // R10 Max cool = 35°C
            } else {
              // Heat & Auto both use heat range
              if (temp_x10 < 150) temp_x10 = 150;   // R04 Min heat = 15°C
              if (temp_x10 > 400) temp_x10 = 400;   // R05 Max heat = 40°C
            }

            std::vector<uint8_t> msg = {
              0x63, 0x10, addr_hi, addr_lo, 0x00, 0x01, 0x02,
              (uint8_t)((temp_x10 >> 8) & 0xFF),
              (uint8_t)(temp_x10 & 0xFF)
            };
            uint16_t crc = 0xFFFF;
            for (auto b : msg) {
              crc ^= b;
              for (int j = 0; j < 8; j++)
                crc = (crc & 1) ? ((crc >> 1) ^ 0xA001) : (crc >> 1);
            }
            msg.push_back(crc & 0xFF);
            msg.push_back((crc >> 8) & 0xFF);
            ESP_LOGI("heatpump", "Set %s target = %.1f (reg 0x%02X%02X)",
                     mode_str.c_str(), temp_x10 / 10.0, addr_hi, addr_lo);
            return msg;

  # Write the power on/off state to register 0x03F3.
  # Captured commands:
  #   OFF: 63 10 03 F3 00 01 02 00 00 30 F1
  #   ON:  63 10 03 F3 00 01 02 00 01 F1 31
  - id: write_power_state
    parameters:
      power_on: bool
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: !lambda |-
            uint8_t val = power_on ? 0x01 : 0x00;
            std::vector<uint8_t> msg = {
              0x63, 0x10, 0x03, 0xF3, 0x00, 0x01, 0x02, 0x00, val
            };
            // CRC16 (Modbus RTU)
            uint16_t crc = 0xFFFF;
            for (auto b : msg) {
              crc ^= b;
              for (int j = 0; j < 8; j++)
                crc = (crc & 1) ? ((crc >> 1) ^ 0xA001) : (crc >> 1);
            }
            msg.push_back(crc & 0xFF);
            msg.push_back((crc >> 8) & 0xFF);
            ESP_LOGI("heatpump", "Set power = %s", power_on ? "ON" : "OFF");
            return msg;

  # Write the operating mode to register 0x03F4 (and 0x03F5).
  # The app writes 2 consecutive registers — we replicate that exactly to
  # match observed behaviour. Register 0x03F5's purpose isn't fully
  # understood but appears mode-dependent.
  #
  # Captured commands (CRCs verified):
  #   HEAT: 63 10 03 F4 00 02 04 00 00 00 00 1C 51
  #   COOL: 63 10 03 F4 00 02 04 00 01 00 88 4D F7
  #   AUTO: 63 10 03 F4 00 02 04 00 02 00 8C BC 34
  - id: write_mode
    parameters:
      mode: string
    then:
      - ble_client.ble_write:
          id: heatpump_ble
          service_uuid: ${service_uuid}
          characteristic_uuid: ${write_char_uuid}
          value: !lambda |-
            // Translate string mode to (mode_val, second_reg) pair.
            // The second register's exact meaning is unknown but the values
            // below match what the official AquaTemp app sends.
            uint8_t mode_lo, sec_hi, sec_lo;
            if (mode == "Cool") {
              mode_lo = 0x01; sec_hi = 0x00; sec_lo = 0x88;
            } else if (mode == "Auto") {
              mode_lo = 0x02; sec_hi = 0x00; sec_lo = 0x8C;
            } else {
              // Default to Heat (mode 0) — also covers any unrecognised string
              mode_lo = 0x00; sec_hi = 0x00; sec_lo = 0x00;
            }

            std::vector<uint8_t> msg = {
              0x63, 0x10, 0x03, 0xF4, 0x00, 0x02, 0x04,
              0x00, mode_lo,
              sec_hi, sec_lo
            };
            // CRC16 (Modbus RTU)
            uint16_t crc = 0xFFFF;
            for (auto b : msg) {
              crc ^= b;
              for (int j = 0; j < 8; j++)
                crc = (crc & 1) ? ((crc >> 1) ^ 0xA001) : (crc >> 1);
            }
            msg.push_back(crc & 0xFF);
            msg.push_back((crc >> 8) & 0xFF);
            ESP_LOGI("heatpump", "Set mode = %s", mode.c_str());
            return msg;

# ─── Periodic Polling (only effective while awake) ──────────────────────────
# When prevent_deep_sleep is on, the device stays awake and this interval
# fires every 30s to refresh sensors. During sleep cycles we sleep long
# before 30s elapses, so this never runs — each wake cycle does its own
# single poll from the on_connect handler.
interval:
  - interval: 30s
    then:
      - script.execute: poll_heat_pump